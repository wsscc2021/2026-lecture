apiVersion: apps/v1
kind: Deployment
metadata:
  name: slow-response
  namespace: demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: slow-response
  template:
    metadata:
      labels:
        app: slow-response
    spec:
      terminationGracePeriodSeconds: 60
      containers:
      - name: slow-response
        image: REGISTRY/day2-05-slow-response:latest
        ports:
        - containerPort: 5000
        env:
        - name: DEFAULT_DELAY
          value: "40"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /health  # /slow 는 40초 응답 → Probe는 즉시 응답하는 /health 사용
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
