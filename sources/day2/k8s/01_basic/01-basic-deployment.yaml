apiVersion: apps/v1
kind: Deployment
metadata:
  name: basic
  namespace: demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: basic
  template:
    metadata:
      labels:
        app: basic
    spec:
      containers:
      - name: basic
        image: REGISTRY/day2-01-basic:latest
        ports:
        - containerPort: 5000
        env:
        - name: SERVICE_NAME
          value: "basic-app"
        - name: VERSION
          value: "1.0.0"
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
