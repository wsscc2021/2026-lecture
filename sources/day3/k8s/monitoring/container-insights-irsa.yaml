# CloudWatch Container Insights — EKS Add-on 설치 가이드
#
# Container Insights는 EKS 클러스터의 컨테이너·Pod·노드 메트릭을
# CloudWatch Metrics(ContainerInsights 네임스페이스)에 자동으로 수집합니다.
#
# 수집 메트릭 예시:
#   pod_cpu_utilization          — Pod CPU 사용률 (limit 대비 %)
#   pod_memory_utilization       — Pod 메모리 사용률 (limit 대비 %)
#   pod_number_of_container_restarts — 컨테이너 재시작 횟수
#   node_cpu_utilization         — 노드 CPU 사용률
#   node_memory_utilization      — 노드 메모리 사용률
#   cluster_node_count           — 클러스터 노드 수
#
# ─────────────────────────────────────────────────────────────────────────────
# Step 1: OIDC Provider 연결 확인 및 생성
# ─────────────────────────────────────────────────────────────────────────────
#
#   eksctl utils associate-iam-oidc-provider \
#     --cluster eks-demo-cluster \
#     --region ap-northeast-2 \
#     --approve

# ─────────────────────────────────────────────────────────────────────────────
# Step 2: CloudWatch Agent용 IRSA 생성
# ─────────────────────────────────────────────────────────────────────────────
#
# AWS 관리형 정책 CloudWatchAgentServerPolicy 사용:
#   - CloudWatch Metrics 쓰기
#   - EC2 메타데이터 읽기 (노드 정보 수집)
#
#   eksctl create iamserviceaccount \
#     --cluster     eks-demo-cluster \
#     --region      ap-northeast-2 \
#     --namespace   amazon-cloudwatch \
#     --name        cloudwatch-agent \
#     --attach-policy-arn arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy \
#     --approve
#
# 생성 확인:
#   kubectl get serviceaccount cloudwatch-agent -n amazon-cloudwatch -o yaml \
#     | grep role-arn

# ─────────────────────────────────────────────────────────────────────────────
# Step 3: Amazon CloudWatch Observability EKS Add-on 설치
# ─────────────────────────────────────────────────────────────────────────────
#
# Add-on은 CloudWatch Agent(DaemonSet)를 자동 설치·관리합니다.
#
# IRSA ARN 조회:
#   ROLE_ARN=$(aws iam get-role \
#     --role-name eks-demo-cluster-cloudwatch-agent \
#     --query Role.Arn --output text)
#
# Add-on 설치:
#   aws eks create-addon \
#     --cluster-name eks-demo-cluster \
#     --addon-name amazon-cloudwatch-observability \
#     --service-account-role-arn ${ROLE_ARN} \
#     --region ap-northeast-2
#
# 설치 상태 확인 (ACTIVE 될 때까지 대기):
#   aws eks describe-addon \
#     --cluster-name eks-demo-cluster \
#     --addon-name amazon-cloudwatch-observability \
#     --region ap-northeast-2 \
#     --query 'addon.status'
#
# Pod 확인:
#   kubectl get pods -n amazon-cloudwatch
#   # cloudwatch-agent-xxxxx (DaemonSet — 노드마다 1개)

# ─────────────────────────────────────────────────────────────────────────────
# Step 4: 메트릭 수집 확인
# ─────────────────────────────────────────────────────────────────────────────
#
# 설치 후 약 2~3분 뒤 CloudWatch에 메트릭이 수집됩니다.
#
#   aws cloudwatch list-metrics \
#     --namespace ContainerInsights \
#     --region ap-northeast-2 \
#     --query 'Metrics[?Dimensions[?Name==`Namespace` && Value==`demo`]]' \
#     --output table
#
# 특정 메트릭 최근 값 조회:
#   aws cloudwatch get-metric-statistics \
#     --namespace ContainerInsights \
#     --metric-name pod_cpu_utilization \
#     --dimensions \
#       Name=ClusterName,Value=eks-demo-cluster \
#       Name=Namespace,Value=demo \
#       Name=Service,Value=cpu-load \
#     --start-time $(date -u -d '10 minutes ago' +%Y-%m-%dT%H:%M:%SZ) \
#     --end-time $(date -u +%Y-%m-%dT%H:%M:%SZ) \
#     --period 60 \
#     --statistics Average Maximum \
#     --region ap-northeast-2
